name: portfolio_optimization

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app:ro
      - ./frontend:/app/frontend:ro
    environment:
      DATABASE_URL: postgresql://portfolio:portfolio@postgres:5432/portfolio
      REDIS_URL: redis://redis:6379/0
      PORTFOLIO_REPOSITORY: postgres
      AUTH_SECRET_KEY: dev-auth-secret-change-me
      DATA_ENCRYPTION_KEY: dev-data-encryption-key-change-me
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: ["python", "-m", "app.background.worker"]
    volumes:
      - ./app:/app/app:ro
    environment:
      DATABASE_URL: postgresql://portfolio:portfolio@postgres:5432/portfolio
      REDIS_URL: redis://redis:6379/0
      PORTFOLIO_REPOSITORY: postgres
      AUTH_SECRET_KEY: dev-auth-secret-change-me
      DATA_ENCRYPTION_KEY: dev-data-encryption-key-change-me
      BACKGROUND_QUEUE_NAME: portfolio-jobs
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
