services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    environment:
      DATABASE_URL: postgresql://portfolio:${POSTGRES_PASSWORD}@postgres:5432/portfolio
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    restart: unless-stopped
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://portfolio:${POSTGRES_PASSWORD}@postgres:5432/portfolio
      REDIS_URL: redis://redis:6379/0
      PORTFOLIO_REPOSITORY: postgres
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS}
      APP_HOSTS: ${APP_HOSTS}
      ENABLE_HSTS: "true"
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      AUTH_DEV_EXPOSE_TOKENS: "false"
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      AUTH_REQUIRE_REDIS_LIMITER: "true"
      MARKET_DATA_CACHE_TTL_SECONDS: ${MARKET_DATA_CACHE_TTL_SECONDS:-900}
      MARKET_DATA_USER_REFRESH_LIMIT_PER_MINUTE: ${MARKET_DATA_USER_REFRESH_LIMIT_PER_MINUTE:-5}
      MARKET_DATA_USER_REFRESH_LIMIT_PER_DAY: ${MARKET_DATA_USER_REFRESH_LIMIT_PER_DAY:-100}
      MARKET_DATA_PORTFOLIO_REFRESH_MIN_SECONDS: ${MARKET_DATA_PORTFOLIO_REFRESH_MIN_SECONDS:-300}
      MARKET_DATA_PROVIDER_FETCH_LIMIT_PER_MINUTE: ${MARKET_DATA_PROVIDER_FETCH_LIMIT_PER_MINUTE:-10}
      MARKET_DATA_PROVIDER_GLOBAL_FETCH_LIMIT_PER_MINUTE: ${MARKET_DATA_PROVIDER_GLOBAL_FETCH_LIMIT_PER_MINUTE:-60}
      MARKET_DATA_PROVIDER_TICKERS_PER_COST_UNIT: ${MARKET_DATA_PROVIDER_TICKERS_PER_COST_UNIT:-5}
      MARKET_DATA_REQUIRE_REDIS_LIMITER: "true"
      MARKET_DATA_MAX_REFRESH_TICKERS: ${MARKET_DATA_MAX_REFRESH_TICKERS:-50}
      MARKET_DATA_MAX_HISTORY_TICKERS: ${MARKET_DATA_MAX_HISTORY_TICKERS:-40}
      MARKET_DATA_MAX_BENCHMARK_TICKERS: ${MARKET_DATA_MAX_BENCHMARK_TICKERS:-8}
      OPTIONS_CHAIN_MAX_SURFACE_EXPIRIES: ${OPTIONS_CHAIN_MAX_SURFACE_EXPIRIES:-4}
      OPTIONS_CHAIN_PROVIDER_COST: ${OPTIONS_CHAIN_PROVIDER_COST:-2}
      OPTIONS_SUITE_PROVIDER_BASE_COST: ${OPTIONS_SUITE_PROVIDER_BASE_COST:-2}
      OPTIONS_HISTORY_ALLOWED_PERIODS: ${OPTIONS_HISTORY_ALLOWED_PERIODS:-1mo,3mo,6mo,1y,2y,5y}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "app.ops.healthcheck", "api"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  worker:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "app.background.worker"]
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://portfolio:${POSTGRES_PASSWORD}@postgres:5432/portfolio
      REDIS_URL: redis://redis:6379/0
      PORTFOLIO_REPOSITORY: postgres
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY}
      BACKGROUND_QUEUE_NAME: portfolio-jobs
      MARKET_DATA_CACHE_TTL_SECONDS: ${MARKET_DATA_CACHE_TTL_SECONDS:-900}
      MARKET_DATA_PROVIDER_FETCH_LIMIT_PER_MINUTE: ${MARKET_DATA_PROVIDER_FETCH_LIMIT_PER_MINUTE:-10}
      MARKET_DATA_PROVIDER_GLOBAL_FETCH_LIMIT_PER_MINUTE: ${MARKET_DATA_PROVIDER_GLOBAL_FETCH_LIMIT_PER_MINUTE:-60}
      MARKET_DATA_PROVIDER_TICKERS_PER_COST_UNIT: ${MARKET_DATA_PROVIDER_TICKERS_PER_COST_UNIT:-5}
      MARKET_DATA_REQUIRE_REDIS_LIMITER: "true"
      MARKET_DATA_MAX_REFRESH_TICKERS: ${MARKET_DATA_MAX_REFRESH_TICKERS:-50}
      MARKET_DATA_MAX_HISTORY_TICKERS: ${MARKET_DATA_MAX_HISTORY_TICKERS:-40}
      MARKET_DATA_MAX_BENCHMARK_TICKERS: ${MARKET_DATA_MAX_BENCHMARK_TICKERS:-8}
      OPTIONS_CHAIN_MAX_SURFACE_EXPIRIES: ${OPTIONS_CHAIN_MAX_SURFACE_EXPIRIES:-4}
      OPTIONS_CHAIN_PROVIDER_COST: ${OPTIONS_CHAIN_PROVIDER_COST:-2}
      OPTIONS_SUITE_PROVIDER_BASE_COST: ${OPTIONS_SUITE_PROVIDER_BASE_COST:-2}
      OPTIONS_HISTORY_ALLOWED_PERIODS: ${OPTIONS_HISTORY_ALLOWED_PERIODS:-1mo,3mo,6mo,1y,2y,5y}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "app.ops.healthcheck", "worker"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  mailpit:
    image: axllent/mailpit:v1.20
    restart: unless-stopped
    profiles: ["local-drill"]
    ports:
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8025/api/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
